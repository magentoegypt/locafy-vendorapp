name: Build APK & IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Android — builds a debug APK (no signing secrets required).
  # For a signed release APK, wire a signingConfig in app/build.gradle and add
  # the keystore + passwords as GitHub secrets, then run :app:assembleRelease.
  # ---------------------------------------------------------------------------
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vendror_android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: vendror_android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # iOS — builds a SIGNED .ipa when signing secrets are configured, otherwise
  # falls back to an UNSIGNED .ipa so the pipeline stays green.
  #
  # Required secrets for signing (Settings > Secrets and variables > Actions):
  #   BUILD_CERTIFICATE_BASE64        base64 of your distribution .p12
  #   P12_PASSWORD                    password for that .p12
  #   BUILD_PROVISION_PROFILE_BASE64  base64 of the matching .mobileprovision
  #   KEYCHAIN_PASSWORD               any random string (temp keychain password)
  #   APPLE_TEAM_ID                   your 10-char Apple Team ID (e.g. Z83RXFCWNH)
  # Optional repository variables:
  #   IOS_EXPORT_METHOD   app-store (default) | ad-hoc | development | enterprise
  #                       — MUST match the provisioning profile's type
  #   IOS_SIGN_IDENTITY   defaults to "Apple Distribution"
  # ---------------------------------------------------------------------------
  ios:
    name: Build iOS IPA
    runs-on: macos-15
    defaults:
      run:
        working-directory: vendor_ios
    steps:
      - uses: actions/checkout@v4

      # Current Firebase pods require the Swift 6 toolchain (Xcode 16+).
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Enable the signed path only when the certificate secret is present.
      - name: Detect signing secrets
        id: signing
        env:
          CERT_B64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        run: |
          if [ -n "$CERT_B64" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present -> building a SIGNED IPA."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No signing secrets -> building an UNSIGNED IPA."
          fi

      - name: Install signing certificate and provisioning profile
        id: signing_assets
        if: steps.signing.outputs.enabled == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          # Create and unlock a temporary keychain, import the cert into it.
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install the provisioning profile (named by its UUID) and expose its name.
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/profile.plist"
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/profile.plist")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"
          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"

      - name: Install CocoaPods dependencies
        run: pod install --repo-update

      - name: Build & export signed IPA
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.signing_assets.outputs.profile_name }}
          EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'app-store' }}
          SIGN_IDENTITY: ${{ vars.IOS_SIGN_IDENTITY || 'Apple Distribution' }}
        run: |
          ARCHIVE="$RUNNER_TEMP/LocafyApp.xcarchive"
          xcodebuild \
            -workspace LocafyApp.xcworkspace \
            -scheme VenderApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY"

          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :ApplicationProperties:CFBundleIdentifier" "$ARCHIVE/Info.plist")
          echo "Exporting bundle $BUNDLE_ID with profile '$PROFILE_NAME' (method: $EXPORT_METHOD)"

          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            "<key>method</key><string>${EXPORT_METHOD}</string>" \
            "<key>teamID</key><string>${APPLE_TEAM_ID}</string>" \
            '<key>signingStyle</key><string>manual</string>' \
            "<key>signingCertificate</key><string>${SIGN_IDENTITY}</string>" \
            '<key>stripSwiftSymbols</key><true/>' \
            '<key>compileBitcode</key><false/>' \
            '<key>provisioningProfiles</key><dict>' \
            "<key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>" \
            '</dict></dict></plist>' > "$RUNNER_TEMP/ExportOptions.plist"

          mkdir -p "$RUNNER_TEMP/output"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/output"

      - name: Build & package unsigned IPA
        if: steps.signing.outputs.enabled == 'false'
        run: |
          ARCHIVE="$RUNNER_TEMP/LocafyApp.xcarchive"
          xcodebuild \
            -workspace LocafyApp.xcworkspace \
            -scheme VenderApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE" \
            archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER=""
          APP=$(ls -d "$ARCHIVE"/Products/Applications/*.app | head -1)
          mkdir -p "$RUNNER_TEMP/output/Payload"
          cp -R "$APP" "$RUNNER_TEMP/output/Payload/"
          (cd "$RUNNER_TEMP/output" && zip -qry LocafyApp-unsigned.ipa Payload && rm -rf Payload)

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LocafyApp-ipa
          path: ${{ runner.temp }}/output/*.ipa
          if-no-files-found: error

      - name: Clean up keychain
        if: ${{ always() && steps.signing.outputs.enabled == 'true' }}
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
